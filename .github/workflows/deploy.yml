name: deploy

# Fork-only Terraform-driven deploy workflow.
#
# Single source of truth = `terraform apply` against the deploy/ stack on the
# `infra` branch of TheLeftMoose/job-ops. No `az` mutations; nothing drifts
# behind Terraform's back.
#
# UX:
#   action       = plan (default) | apply
#   image_tag    = GHCR tag (default :edge) -> -var image=ghcr.io/.../job-ops:<tag>
#   revision_suffix = optional -> -var revision_suffix=<value> (force re-pull
#                  of KV-backed secrets after rotation)
#   ref          = git ref of deploy/ to use (default: infra)
#
# Apply runs in the `prod` GitHub Environment, which is configured with a
# required reviewer. Plan runs without environment gating.

on:
  workflow_dispatch:
    inputs:
      action:
        description: "plan or apply"
        type: choice
        options: [plan, apply]
        default: plan
        required: true
      image_tag:
        description: "GHCR image tag (e.g. edge, sha-abc1234, v1.2.3)"
        type: string
        default: edge
        required: true
      revision_suffix:
        description: "Optional revision suffix. Bump (e.g. timestamp) to force re-pull of KV-backed secrets."
        type: string
        default: ""
        required: false
      ref:
        description: "Branch / tag / SHA of the deploy/ stack to apply"
        type: string
        default: infra
        required: true

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "0"
  IMAGE_REPO: ghcr.io/theleftmoose/job-ops

jobs:
  # ---------------------------------------------------------------------------
  # plan: always runs. Surfaces the diff in the run log + step summary so the
  # apply-gate reviewer has something to actually review.
  # ---------------------------------------------------------------------------
  plan:
    if: github.repository == 'TheLeftMoose/job-ops'
    runs-on: ubuntu-latest
    outputs:
      plan_has_changes: ${{ steps.plan.outputs.has_changes }}
    steps:
      - name: Checkout deploy stack
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        working-directory: deploy
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: terraform init -input=false

      - name: Terraform plan
        id: plan
        working-directory: deploy
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          IMAGE="${IMAGE_REPO}:${{ inputs.image_tag }}"
          ARGS=(-input=false -lock-timeout=5m -out=tfplan -var "image=${IMAGE}")
          if [[ -n "${{ inputs.revision_suffix }}" ]]; then
            ARGS+=(-var "revision_suffix=${{ inputs.revision_suffix }}")
          fi
          # -detailed-exitcode: 0=no changes, 1=error, 2=changes
          set +e
          terraform plan "${ARGS[@]}" -detailed-exitcode
          rc=$?
          set -e
          case "$rc" in
            0) echo "has_changes=false" >> "$GITHUB_OUTPUT" ;;
            2) echo "has_changes=true"  >> "$GITHUB_OUTPUT" ;;
            *) exit "$rc" ;;
          esac

          {
            echo "## Terraform plan"
            echo ""
            echo "image: \`${IMAGE}\`"
            echo "revision_suffix: \`${{ inputs.revision_suffix }}\`"
            echo "ref: \`${{ inputs.ref }}\`"
            echo ""
            echo '```'
            terraform show -no-color tfplan
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        if: inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: deploy/tfplan
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # apply: only runs when action=apply. Re-checks out the same ref, re-inits
  # Terraform, downloads the plan from the previous job, and applies it.
  #
  # Re-running plan in the same job would risk applying a different plan than
  # the reviewer saw (TOCTOU). Uploading the plan artifact and consuming it
  # here keeps "what was approved" == "what gets applied".
  # ---------------------------------------------------------------------------
  apply:
    if: github.repository == 'TheLeftMoose/job-ops' && inputs.action == 'apply'
    needs: plan
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout deploy stack
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8
          terraform_wrapper: false

      - name: Terraform init
        working-directory: deploy
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: terraform init -input=false

      - name: Download plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: deploy

      - name: Terraform apply
        working-directory: deploy
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: terraform apply -input=false -auto-approve -lock-timeout=5m tfplan

      - name: Show outputs
        working-directory: deploy
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: terraform output
